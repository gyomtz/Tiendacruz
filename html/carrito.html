<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito</title>

<link rel="stylesheet" href="../css/styles.css">

</head>

<body>

<header class="topbar">

  <a href="../index.html" class="logo">
    <img src="../imagenes/logo.png" height="40" alt="logo">
    <span>Abarrotes Cruz</span>
  </a>

  <div class="busqueda">
    <input type="text" placeholder="Buscar productos...">
    <button>🔍</button>
  </div>

  <div class="acciones">

    <div class="login">
      Iniciar sesión
    </div>

    <a href="carrito.html" class="carrito">
      🛒 $<span id="contador-carrito">0</span>
    </a>

  </div>

</header>

<nav class="menu-carrito">
  <a href="producto.html">Producto</a>
  <a href="sobre.html">Sobre nosotros</a>
  <a href="ayuda.html">Ayuda</a>
</nav>

<section class="carrito-box"></section>

<section class="carrito-productos">

  <h2>Artículos populares</h2>

  <div class="productos">

    <div class="card">
      <img src="https://m.media-amazon.com/images/I/81eB+7+CkUL.jpg" alt="Arroz">
      <h3>Arroz</h3>
      <p>$25</p>
      <button onclick="agregar('Arroz',25)">Comprar</button>
    </div>

    <div class="card">
      <img src="https://m.media-amazon.com/images/I/71HMyqG6MRL.jpg" alt="Leche">
      <h3>Leche</h3>
      <p>$22</p>
      <button onclick="agregar('Leche',22)">Comprar</button>
    </div>

    <div class="card">
      <img src="https://m.media-amazon.com/images/I/61R8XgRZKEL.jpg" alt="Refresco">
      <h3>Refresco</h3>
      <p>$20</p>
      <button onclick="agregar('Refresco',20)">Comprar</button>
    </div>

    <div class="card">
      <img src="https://m.media-amazon.com/images/I/71y2vY2WbPL.jpg" alt="Pan">
      <h3>Pan</h3>
      <p>$30</p>
      <button onclick="agregar('Pan',30)">Comprar</button>
    </div>

  </div>

</section>

<footer class="footer">

  <div class="footer-box">

    <div class="footer-card">
      <h3>📞 Contacto</h3>
      <p>+953 123 4567</p>
      <p>abarrotescruz@gmail.com</p>
    </div>

    <div class="footer-card">
      <h3>📍 Ubicación</h3>
      <p>Calle Linda Vista</p>
      <p>Col. El Carmen</p>
    </div>

    <div class="footer-card">
      <h3>🌐 Redes</h3>
      <p>Facebook</p>
      <p>Instagram</p>
    </div>

  </div>

  <p class="copy">© 2026 Abarrotes Cruz</p>

</footer>

<script src="../js/mostrarCarrito.js"></script>

</html>
